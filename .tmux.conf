# Enable mouse mode for easier scrolling and pane management
set -g mouse on

# Set the prefix key to Ctrl-A (optional, some prefer this)
# set-option -g prefix C-a
# unbind-key C-b
# bind-key C-a send-prefix

# Enable 256 color support
set -g default-terminal "screen-256color"

# Allow copying to system clipboard if available
set -g set-clipboard on