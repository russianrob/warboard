<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactionOps — Access</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0d1117;color:#e6edf3;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.gate-card{
  background:#161b22;border:1px solid #30363d;border-radius:12px;
  padding:40px 32px;max-width:400px;width:100%;text-align:center;
}
.gate-logo{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:24px;
}
.gate-logo svg{width:32px;height:32px;}
.gate-logo span{
  font-size:18px;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:#e6edf3;
}
.gate-title{
  font-size:14px;color:#8b949e;margin-bottom:24px;line-height:1.5;
}
.gate-form{display:flex;flex-direction:column;gap:12px;}
.gate-input{
  background:#0d1117;border:1px solid #30363d;border-radius:8px;
  padding:12px 16px;font-size:14px;color:#e6edf3;
  outline:none;transition:border-color 0.2s;
}
.gate-input:focus{border-color:#e17055;}
.gate-input::placeholder{color:#484f58;}
.gate-btn{
  background:#e17055;color:#fff;border:none;border-radius:8px;
  padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;
  transition:background 0.2s;
}
.gate-btn:hover{background:#d35e44;}
.gate-btn:disabled{opacity:0.6;cursor:not-allowed;}
.gate-error{
  color:#f85149;font-size:13px;min-height:20px;margin-top:4px;
}
.gate-hint{
  font-size:12px;color:#484f58;margin-top:16px;line-height:1.5;
}
.gate-hint a{color:#58a6ff;text-decoration:none;}
.gate-hint a:hover{text-decoration:underline;}
.gate-spinner{display:none;margin:0 auto;}
.gate-spinner.active{display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.gate-spinner svg{animation:spin 0.8s linear infinite;width:20px;height:20px;}
</style>
</head>
<body>
<div class="gate-card">
  <div class="gate-logo">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="18" height="18" rx="3" stroke="#e17055" stroke-width="1.5" fill="none"/>
      <path d="M6 6h8M6 10h5M6 14h8" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="15" cy="14" r="2" fill="#00b894"/>
    </svg>
    <span>FactionOps</span>
  </div>

  <p class="gate-title">This site is restricted to faction members.<br>Enter your Torn API key to continue.</p>

  <form class="gate-form" id="gate-form">
    <input class="gate-input" type="password" id="api-key" placeholder="Torn API Key" autocomplete="off" required>
    <button class="gate-btn" type="submit" id="gate-btn">
      <span id="btn-text">Verify</span>
      <span class="gate-spinner" id="spinner">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" opacity=".3"/>
          <path d="M12 2v4"/>
        </svg>
      </span>
    </button>
    <div class="gate-error" id="error"></div>
  </form>

  <p class="gate-hint">
    Get your API key from
    <a href="https://www.torn.com/preferences.php#tab=api" target="_blank" rel="noopener">Torn Settings &rarr; API</a>.
    A minimal-access key is fine.
  </p>
</div>

<script>
document.getElementById('gate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('gate-btn');
  const btnText = document.getElementById('btn-text');
  const spinner = document.getElementById('spinner');
  const errorEl = document.getElementById('error');
  const apiKey = document.getElementById('api-key').value.trim();

  if (!apiKey) return;

  btn.disabled = true;
  btnText.textContent = 'Verifying...';
  spinner.classList.add('active');
  errorEl.textContent = '';

  const maxRetries = 2;
  for (let attempt = 0; attempt < maxRetries; attempt++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      const res = await fetch('/api/gate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey }),
        signal: controller.signal,
      });
      clearTimeout(timeout);

      const data = await res.json();

      if (res.ok) {
        btnText.textContent = 'Welcome, ' + data.playerName;
        spinner.classList.remove('active');
        setTimeout(() => { window.location.href = '/'; }, 600);
        return;
      } else {
        errorEl.textContent = data.error || 'Verification failed';
        btn.disabled = false;
        btnText.textContent = 'Verify';
        spinner.classList.remove('active');
        return;
      }
    } catch (err) {
      if (attempt < maxRetries - 1) {
        // Wait 1s then retry
        await new Promise(r => setTimeout(r, 1000));
        continue;
      }
      errorEl.textContent = 'Network error — please try again';
      btn.disabled = false;
      btnText.textContent = 'Verify';
      spinner.classList.remove('active');
    }
  }
});
</script>
</body>
</html>
