<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactionOps — Access Required</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-surface: #12121a;
            --bg-card: rgba(18, 18, 26, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #e0e0ea;
            --text-secondary: #8888a0;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.1);
            --accent-glow: rgba(0, 212, 170, 0.2);
            --red: #ff4757;
            --transition: 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════════════════
           ANIMATED BACKGROUND (Matching Index)
           ═══════════════════════════════════════════ */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -2;
            background-image:
                linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 200vh;
            pointer-events: none;
            z-index: -1;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 212, 170, 0.008) 2px,
                rgba(0, 212, 170, 0.008) 4px
            );
            animation: scanlineScroll 8s linear infinite;
        }

        @keyframes scanlineScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* ═══════════════════════════════════════════
           GLASS CARD (Refined OC Manager Style)
           ═══════════════════════════════════════════ */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 48px 40px;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 
                0 4px 24px rgba(0,0,0,0.4),
                inset 0 0 0 1px rgba(255,255,255,0.03);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: cardEntrance 0.8s var(--transition);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-box {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .logo-box svg {
            width: 56px;
            height: 56px;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 36px;
            line-height: 1.5;
        }

        /* Input Styling */
        .input-container {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            transition: all 0.3s var(--transition);
            outline: none;
            text-align: center;
            letter-spacing: 0.05em;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.1);
        }

        input::placeholder {
            color: #44445a;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.1em;
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #050508;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            transition: all 0.3s var(--transition);
            box-shadow: 0 8px 20px rgba(0, 212, 170, 0.2);
            margin-top: 8px;
        }

        button:hover {
            background: #33e0be;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 212, 170, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #2a2a3a;
            color: #55556a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #error {
            margin-top: 24px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
            min-height: 16px;
            transition: color 0.3s ease;
        }

        .error-text { color: var(--red); }
        .success-text { color: var(--accent); }
        .loading-text { color: var(--text-secondary); }

        .footer-note {
            margin-top: 48px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #44445a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* Pulse dot for loading state */
        .pulse {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            margin-left: 4px;
            animation: pulse-anim 1s infinite;
        }
        @keyframes pulse-anim {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="scanline"></div>

    <div class="card">
        <div class="logo-box">
            <svg viewBox="0 0 28 28">
                <path d="M14 2L2 14l12 12 12-12L14 2z" fill="none" stroke="#00d4aa" stroke-width="2"/>
                <path d="M14 8L8 14l6 6 6-6-6-6z" fill="#00d4aa"/>
            </svg>
        </div>
        <h1>FactionOps</h1>
        <p class="subtitle">Secure terminal access required.<br>Enter your API key to synchronize.</p>
        
        <div class="input-container">
            <input type="password" id="apiKey" placeholder="TORN_API_KEY" spellcheck="false" autocomplete="off">
        </div>
        
        <button id="loginBtn" onclick="login()">Initiate Sync</button>
        
        <div id="error"></div>

        <div class="footer-note">
            // End-to-End Encrypted Relay
        </div>
    </div>

    <script>
        async function login() {
            const input = document.getElementById('apiKey');
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('error');
            const apiKey = (input.value || '').trim();

            if (!apiKey) {
                err.className = 'error-text';
                err.innerText = "Error: Key required";
                return;
            }

            // Reset UI
            err.className = 'loading-text';
            err.innerHTML = 'Authenticating<span class="pulse"></span>';
            btn.disabled = true;
            input.disabled = true;
            
            try {
                const res = await fetch('/api/gate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey })
                });
                const data = await res.json();
                
                if (res.ok) {
                    err.className = 'success-text';
                    err.innerText = "ACCESS GRANTED. REDIRECTING...";
                    setTimeout(() => {
                        window.location.href = "/";
                    }, 600);
                } else {
                    err.className = 'error-text';
                    err.innerText = "FAILED: " + (data.error || "INVALID KEY").toUpperCase();
                    btn.disabled = false;
                    input.disabled = false;
                }
            } catch (e) {
                err.className = 'error-text';
                err.innerText = "CONNECTION_REFUSED";
                btn.disabled = false;
                input.disabled = false;
            }
        }

        // Allow Enter key to trigger login
        document.getElementById('apiKey').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });

        // Autofocus on load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('apiKey').focus();
        });
    </script>
</body>
</html>
